<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Playon 관리자</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#F3F2EE;color:#111111;font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;line-height:1.55;word-break:keep-all}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.btn{min-height:42px;border:0;border-radius:10px;padding:0 16px;background:#171717;color:#FFFFFF;font-weight:700}.btn:hover{background:#000000}.btn.light{background:#FFFFFF;color:#111111;border:1px solid #D7D4CC}.btn.orange{background:#E07A3A;color:#111111}.btn.danger{background:#FFFFFF;color:#A22818;border:1px solid #E5B8B0}.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,100%);background:#FFFFFF;border:1px solid #DDDBD4;border-radius:20px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.07)}.logo{margin:0;color:#111111;font-size:27px;font-weight:800;letter-spacing:-.05em}.logo span{color:#C05500}.login-card h1{margin:26px 0 7px;color:#111111;font-size:25px}.login-card p{margin:0 0 23px;color:#555555}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}.field label{color:#333333;font-size:13px;font-weight:700}.field input,.field select,.field textarea{width:100%;border:1px solid #CFCBC1;border-radius:10px;background:#FFFFFF;color:#111111;padding:11px 12px}.field textarea{min-height:88px;resize:vertical}.login-card .btn{width:100%;margin-top:5px}.message{margin-top:14px;padding:11px;border-radius:9px;background:#FFF0E5;color:#8A3900;font-size:13px}.setup-card{border:1px solid #F0C29E;background:#FFF7F1;border-radius:13px;padding:16px;margin-bottom:18px}.setup-card strong{display:block;color:#111111}.setup-card p{margin:5px 0 0;color:#555555;font-size:13px}.shell{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.sidebar{position:sticky;top:0;height:100vh;background:#171717;padding:25px 17px}.sidebar .logo{color:#FFFFFF}.admin-label{display:block;margin:5px 0 30px;color:#AAAAAA;font-size:12px}.nav-btn{width:100%;display:flex;align-items:center;gap:10px;margin:5px 0;border:0;border-radius:10px;padding:12px;background:transparent;color:#CCCCCC;text-align:left;font-weight:650}.nav-btn.active,.nav-btn:hover{background:#303030;color:#FFFFFF}.logout{position:absolute;bottom:22px;left:17px;right:17px}.main{min-width:0;padding:35px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:28px}.topbar h1{margin:0;color:#111111;font-size:31px;letter-spacing:-.035em}.topbar p{margin:4px 0 0;color:#666666}.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px}.search{width:min(340px,100%);min-height:42px;border:1px solid #CFCBC1;border-radius:10px;background:#FFFFFF;padding:0 13px;color:#111111}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.stat{background:#FFFFFF;border:1px solid #DDDBD4;border-radius:14px;padding:17px}.stat span{display:block;color:#666666;font-size:12px}.stat strong{display:block;margin-top:5px;color:#111111;font-size:24px}.panel{background:#FFFFFF;border:1px solid #DDDBD4;border-radius:16px;overflow:hidden}.product-row{display:grid;grid-template-columns:62px minmax(180px,1.3fr) .7fr .8fr .6fr auto;align-items:center;gap:15px;padding:13px 17px;border-bottom:1px solid #ECE9E2}.product-row:last-child{border:0}.thumb{width:62px;height:62px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#F3F2EE;overflow:hidden;font-size:25px}.thumb img{width:100%;height:100%;object-fit:cover}.product-row h3{margin:0;color:#111111;font-size:15px}.product-row p{margin:3px 0 0;color:#666666;font-size:12px}.price{color:#333333;font-size:13px}.stock{color:#333333;font-size:13px}.pill{display:inline-flex;border-radius:999px;padding:5px 8px;background:#D6F5E8;color:#006633;font-size:11px;font-weight:700}.pill.off{background:#EEEEEE;color:#666666}.pill.both{background:#D6E8FF;color:#003D99}.row-actions{display:flex;gap:6px}.icon-action{width:38px;height:38px;border:1px solid #D7D4CC;border-radius:9px;background:#FFFFFF;color:#111111}.empty{padding:60px 20px;text-align:center;color:#666666}.inquiry-row{display:grid;grid-template-columns:1fr .8fr .8fr .7fr auto;gap:15px;align-items:center;padding:17px;border-bottom:1px solid #ECE9E2}.inquiry-row h3{margin:0;color:#111111;font-size:15px}.inquiry-row p{margin:4px 0 0;color:#666666;font-size:12px}.inquiry-row select{border:1px solid #CFCBC1;border-radius:8px;background:#FFFFFF;padding:8px;color:#111111}.modal-bg{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.5)}.modal-bg.open{display:flex}.modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:#FFFFFF;border-radius:18px;padding:25px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:21px}.modal-head h2{margin:0;color:#111111}.close{width:40px;height:40px;border:1px solid #D7D4CC;border-radius:50%;background:#FFFFFF;color:#111111;font-size:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}.full{grid-column:1/-1}.checks{display:flex;gap:17px;flex-wrap:wrap;border:1px solid #E2DFD7;border-radius:11px;padding:13px;margin-bottom:14px}.checks label{color:#333333;font-size:13px;font-weight:650}.checks input{margin-right:6px}.image-preview{width:100%;height:190px;border:1px dashed #CFCBC1;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#F7F6F2;color:#666666}.image-preview img{width:100%;height:100%;object-fit:contain}.modal-actions{display:flex;justify-content:space-between;gap:10px;margin-top:18px}.modal-actions-right{display:flex;gap:8px}.busy{opacity:.6;pointer-events:none}
    @media(max-width:850px){.shell{grid-template-columns:1fr}.sidebar{position:static;height:auto;display:flex;align-items:center;gap:8px;padding:13px}.sidebar .logo{margin-right:auto}.admin-label{display:none}.nav-btn{width:auto;margin:0;padding:10px}.logout{position:static;inset:auto}.main{padding:23px 14px 80px}.topbar{align-items:flex-start}.stats{grid-template-columns:1fr 1fr}.product-row{grid-template-columns:54px 1fr auto;padding:12px}.product-row>:nth-child(3),.product-row>:nth-child(4),.product-row>:nth-child(5){display:none}.inquiry-row{grid-template-columns:1fr auto}.inquiry-row>:nth-child(2),.inquiry-row>:nth-child(3),.inquiry-row>:nth-child(4){display:none}.form-grid{grid-template-columns:1fr}.full{grid-column:auto}.toolbar{align-items:stretch;flex-direction:column}.search{width:100%}}
  </style>
</head>
<body>
  <section class="login-wrap" id="loginView"><div class="login-card"><p class="logo">play<span>on</span></p><h1>관리자 로그인</h1><p>상품, 가격, 재고와 고객 문의를 관리합니다.</p><div class="setup-card hidden" id="setupNotice"><strong>Supabase 연결이 필요합니다</strong><p><code>config.js</code>에 프로젝트 URL과 anon key를 입력해 주세요.</p></div><form id="loginForm"><div class="field"><label for="loginEmail">이메일</label><input id="loginEmail" type="email" autocomplete="username" required></div><div class="field"><label for="loginPassword">비밀번호</label><input id="loginPassword" type="password" autocomplete="current-password" required></div><button class="btn" type="submit">로그인</button><div class="message hidden" id="loginMessage"></div></form></div></section>
  <div class="shell hidden" id="adminView"><aside class="sidebar"><p class="logo">play<span>on</span></p><span class="admin-label">ADMIN CONSOLE</span><button class="nav-btn active" data-view="products">상품 관리</button><button class="nav-btn" data-view="inquiries">고객 문의</button><button class="nav-btn logout" id="logoutButton">로그아웃</button></aside><main class="main"><div id="productsView"><div class="topbar"><div><h1>상품 관리</h1><p>사진, 가격, 판매 방식과 재고를 관리합니다.</p></div><button class="btn orange" id="newProduct">새 상품 추가</button></div><div class="stats"><div class="stat"><span>전체 상품</span><strong id="statAll">0</strong></div><div class="stat"><span>홈페이지 노출</span><strong id="statVisible">0</strong></div><div class="stat"><span>렌탈 가능</span><strong id="statRental">0</strong></div><div class="stat"><span>판매 가능</span><strong id="statSale">0</strong></div></div><div class="toolbar"><input class="search" id="productSearch" type="search" placeholder="상품명 검색"><select class="search" id="categoryFilter"><option value="">전체 카테고리</option><option>스포츠</option><option>비디오</option><option>슈팅</option><option>리듬</option><option>키즈</option><option>인형뽑기</option></select></div><div class="panel" id="productList"></div></div><div id="inquiriesView" class="hidden"><div class="topbar"><div><h1>고객 문의</h1><p>홈페이지에서 접수된 견적 요청입니다.</p></div><button class="btn light" id="refreshInquiries">새로고침</button></div><div class="panel" id="inquiryList"></div></div></main></div>
  <div class="modal-bg" id="productModal"><div class="modal"><div class="modal-head"><h2 id="formTitle">상품 수정</h2><button class="close" id="closeModal" type="button" aria-label="닫기">×</button></div><form id="productForm"><input id="productId" type="hidden"><div class="form-grid"><div class="field"><label for="productName">상품명</label><input id="productName" required></div><div class="field"><label for="productCategory">카테고리</label><select id="productCategory" required><option>스포츠</option><option>비디오</option><option>슈팅</option><option>리듬</option><option>키즈</option><option>인형뽑기</option></select></div><div class="field full"><label for="productDescription">설명</label><textarea id="productDescription"></textarea></div><div class="field"><label for="rentalPrice">렌탈 가격(원)</label><input id="rentalPrice" type="number" min="0" step="1000"></div><div class="field"><label for="salePrice">판매 가격(원)</label><input id="salePrice" type="number" min="0" step="1000"></div><div class="field full"><label for="priceNote">가격 안내 문구</label><input id="priceNote" placeholder="예: 기간·지역에 따라 별도 견적"></div><div class="field"><label for="stockTotal">총 보유 수량</label><input id="stockTotal" type="number" min="0" required value="1"></div><div class="field"><label for="stockMaintenance">수리·점검 중</label><input id="stockMaintenance" type="number" min="0" required value="0"></div><div class="field"><label for="sortOrder">노출 순서</label><input id="sortOrder" type="number" value="0"></div><div class="field"><label for="productImage">대표 사진</label><input id="productImage" type="file" accept="image/jpeg,image/png,image/webp"></div><div class="field full"><div class="image-preview" id="imagePreview">등록된 이미지 없음</div></div></div><div class="checks"><label><input id="rentalEnabled" type="checkbox" checked>렌탈 가능</label><label><input id="saleEnabled" type="checkbox">판매 가능</label><label><input id="productVisible" type="checkbox" checked>홈페이지 노출</label><label><input id="productFeatured" type="checkbox">추천 상품</label></div><div class="modal-actions"><button class="btn danger hidden" id="deleteProduct" type="button">상품 삭제</button><div class="modal-actions-right"><button class="btn light" id="cancelModal" type="button">취소</button><button class="btn" type="submit">저장</button></div></div></form></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script>
  <script>
    const cfg=window.PLAYON_CONFIG||{},configured=cfg.supabaseUrl&&cfg.supabaseAnonKey;let db=null,products=[],editing=null;
    const $=id=>document.getElementById(id),money=n=>n==null?'가격 문의':Number(n).toLocaleString('ko-KR')+'원',mode=p=>p.rental_enabled&&p.sale_enabled?'렌탈·판매':p.rental_enabled?'렌탈 전용':'판매 전용';
    if(!configured){$('setupNotice').classList.remove('hidden');$('loginForm').classList.add('hidden')}else{db=window.supabase.createClient(cfg.supabaseUrl,cfg.supabaseAnonKey);boot()}
    async function boot(){const {data}=await db.auth.getSession();if(data.session)showAdmin();db.auth.onAuthStateChange((_e,s)=>{if(!s)showLogin()})}
    $('loginForm').addEventListener('submit',async e=>{e.preventDefault();setLoginMessage('로그인 중입니다.');const {error}=await db.auth.signInWithPassword({email:$('loginEmail').value,password:$('loginPassword').value});if(error)return setLoginMessage(error.message);await showAdmin()});
    function setLoginMessage(msg){$('loginMessage').textContent=msg;$('loginMessage').classList.remove('hidden')}function showLogin(){$('adminView').classList.add('hidden');$('loginView').classList.remove('hidden')}async function showAdmin(){$('loginView').classList.add('hidden');$('adminView').classList.remove('hidden');await loadProducts();await loadInquiries()}
    $('logoutButton').onclick=()=>db.auth.signOut();
    document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x===b));$('productsView').classList.toggle('hidden',b.dataset.view!=='products');$('inquiriesView').classList.toggle('hidden',b.dataset.view!=='inquiries')});
    async function loadProducts(){const {data,error}=await db.from('products').select('*').order('sort_order');if(error){$('productList').innerHTML=`<div class="empty">상품을 불러올 수 없습니다.<br>${escapeHtml(error.message)}</div>`;return}products=data||[];renderProducts()}
    function renderProducts(){const q=$('productSearch').value.trim().toLowerCase(),cat=$('categoryFilter').value,list=products.filter(p=>(!q||p.name.toLowerCase().includes(q))&&(!cat||p.category===cat));$('statAll').textContent=products.length;$('statVisible').textContent=products.filter(p=>p.visible).length;$('statRental').textContent=products.filter(p=>p.rental_enabled).length;$('statSale').textContent=products.filter(p=>p.sale_enabled).length;$('productList').innerHTML=list.length?list.map(p=>`<article class="product-row"><div class="thumb">${p.image_url?`<img src="${escapeAttr(p.image_url)}" alt="">`:'사진'}</div><div><h3>${escapeHtml(p.name)}</h3><p>${p.category} · ${mode(p)}</p></div><div class="price">렌탈 ${money(p.rental_price)}<br>판매 ${money(p.sale_price)}</div><div class="stock">가용 ${Math.max(0,p.stock_total-p.stock_maintenance)}대<br>전체 ${p.stock_total}대</div><div><span class="pill ${p.visible?'':'off'}">${p.visible?'노출 중':'숨김'}</span></div><div class="row-actions"><button class="icon-action" data-edit="${p.id}" aria-label="${escapeAttr(p.name)} 수정">수정</button></div></article>`).join(''):'<div class="empty">조건에 맞는 상품이 없습니다.</div>'}
    $('productSearch').oninput=renderProducts;$('categoryFilter').onchange=renderProducts;$('productList').onclick=e=>{const b=e.target.closest('[data-edit]');if(b)openProduct(products.find(p=>p.id===b.dataset.edit))};$('newProduct').onclick=()=>openProduct(null);
    function openProduct(p){editing=p;$('formTitle').textContent=p?'상품 수정':'새 상품 추가';$('productId').value=p?.id||'';$('productName').value=p?.name||'';$('productCategory').value=p?.category||'스포츠';$('productDescription').value=p?.description||'';$('rentalPrice').value=p?.rental_price??'';$('salePrice').value=p?.sale_price??'';$('priceNote').value=p?.price_note||'';$('stockTotal').value=p?.stock_total??1;$('stockMaintenance').value=p?.stock_maintenance??0;$('sortOrder').value=p?.sort_order??0;$('rentalEnabled').checked=p?.rental_enabled??true;$('saleEnabled').checked=p?.sale_enabled??false;$('productVisible').checked=p?.visible??true;$('productFeatured').checked=p?.featured??false;$('productImage').value='';showPreview(p?.image_url);$('deleteProduct').classList.toggle('hidden',!p);$('productModal').classList.add('open')}
    function closeProduct(){$('productModal').classList.remove('open')}function showPreview(url){$('imagePreview').innerHTML=url?`<img src="${escapeAttr(url)}" alt="상품 이미지 미리보기">`:'등록된 이미지 없음'}$('closeModal').onclick=closeProduct;$('cancelModal').onclick=closeProduct;$('productModal').onclick=e=>{if(e.target===$('productModal'))closeProduct()};$('productImage').onchange=e=>{const f=e.target.files[0];if(f)showPreview(URL.createObjectURL(f))};
    $('productForm').addEventListener('submit',async e=>{e.preventDefault();if(!$('rentalEnabled').checked&&!$('saleEnabled').checked)return alert('렌탈 또는 판매 중 하나는 선택해야 합니다.');if(Number($('stockMaintenance').value)>Number($('stockTotal').value))return alert('수리 중 수량은 총수량보다 클 수 없습니다.');setBusy(true);try{let imageUrl=editing?.image_url||null,file=$('productImage').files[0];if(file){const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'-'),path=`${Date.now()}-${crypto.randomUUID()}-${safe}`;const {error:uploadError}=await db.storage.from('product-images').upload(path,file,{upsert:false});if(uploadError)throw uploadError;imageUrl=db.storage.from('product-images').getPublicUrl(path).data.publicUrl}const payload={name:$('productName').value.trim(),category:$('productCategory').value,description:$('productDescription').value.trim(),image_url:imageUrl,rental_enabled:$('rentalEnabled').checked,sale_enabled:$('saleEnabled').checked,rental_price:numOrNull($('rentalPrice').value),sale_price:numOrNull($('salePrice').value),price_note:$('priceNote').value.trim(),stock_total:Number($('stockTotal').value),stock_maintenance:Number($('stockMaintenance').value),sort_order:Number($('sortOrder').value),visible:$('productVisible').checked,featured:$('productFeatured').checked};let result=editing?await db.from('products').update(payload).eq('id',editing.id):await db.from('products').insert(payload);if(result.error)throw result.error;closeProduct();await loadProducts()}catch(err){alert('저장 실패: '+err.message)}finally{setBusy(false)}});
    $('deleteProduct').onclick=async()=>{if(!editing||!confirm(`'${editing.name}' 상품을 삭제할까요? 기존 문의 기록의 상품명은 보존됩니다.`))return;setBusy(true);const {error}=await db.from('products').delete().eq('id',editing.id);setBusy(false);if(error)return alert(error.message);closeProduct();await loadProducts()};function setBusy(on){$('productForm').classList.toggle('busy',on)}
    async function loadInquiries(){if(!db)return;const {data,error}=await db.from('inquiries').select('*,inquiry_items(*)').order('created_at',{ascending:false});$('inquiryList').innerHTML=error?`<div class="empty">${escapeHtml(error.message)}</div>`:(data||[]).length?(data||[]).map(i=>`<article class="inquiry-row"><div><h3>${escapeHtml(i.company)} · ${escapeHtml(i.contact_name)}</h3><p>${escapeHtml(i.phone)} · ${(i.inquiry_items||[]).map(x=>`${escapeHtml(x.product_name)} ${x.quantity}대`).join(', ')||'맞춤 추천'}</p></div><div>${i.event_date||'날짜 미정'}</div><div>${escapeHtml(i.place||'장소 미정')}</div><div>${new Date(i.created_at).toLocaleDateString('ko-KR')}</div><select data-inquiry-status="${i.id}"><option value="new" ${i.status==='new'?'selected':''}>신규</option><option value="contacted" ${i.status==='contacted'?'selected':''}>연락 완료</option><option value="quoted" ${i.status==='quoted'?'selected':''}>견적 발송</option><option value="confirmed" ${i.status==='confirmed'?'selected':''}>예약 확정</option><option value="closed" ${i.status==='closed'?'selected':''}>종료</option></select></article>`).join(''):'<div class="empty">접수된 문의가 없습니다.</div>'}
    $('refreshInquiries').onclick=loadInquiries;$('inquiryList').onchange=async e=>{if(e.target.dataset.inquiryStatus){const {error}=await db.from('inquiries').update({status:e.target.value}).eq('id',e.target.dataset.inquiryStatus);if(error)alert(error.message)}};
    function numOrNull(v){return v===''?null:Number(v)}function escapeHtml(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function escapeAttr(s=''){return escapeHtml(s)}
  </script>
</body>
</html>
